<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#388BFD;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#388BFD;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#58A6FF" stroke-width="0.5">
    <line x1="0" y1="0" x2="1500" y2="500"/>
    <line x1="300" y1="0" x2="1500" y2="400"/>
    <line x1="0" y1="100" x2="1200" y2="500"/>
    <line x1="600" y1="0" x2="1500" y2="300"/>
    <line x1="0" y1="200" x2="900" y2="500"/>
    <line x1="900" y1="0" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="500"/>
    <line x1="1200" y1="0" x2="1500" y2="100"/>
  </g>
  <!-- Glow accent -->
  <rect width="1500" height="500" fill="url(#glow)"/>
  <!-- Decorative circles -->
  <circle cx="1200" cy="250" r="180" fill="none" stroke="#388BFD" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1200" cy="250" r="140" fill="none" stroke="#388BFD" stroke-width="0.5" opacity="0.06"/>
  <circle cx="1200" cy="250" r="100" fill="none" stroke="#58A6FF" stroke-width="0.5" opacity="0.04"/>
  <!-- Dots pattern -->
  <g opacity="0.06" fill="#58A6FF">
    <circle cx="50" cy="50" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="150" cy="50" r="1.5"/><circle cx="200" cy="50" r="1.5"/><circle cx="250" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/><circle cx="100" cy="100" r="1.5"/><circle cx="150" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="250" cy="100" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/><circle cx="100" cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/><circle cx="200" cy="150" r="1.5"/><circle cx="250" cy="150" r="1.5"/>
  </g>
  <!-- Name -->
  <text x="100" y="220" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#E6EDF3">Arthur Cavalcanti</text>
  <!-- Subtitle -->
  <text x="100" y="280" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#388BFD">Backend &amp; Full Stack Developer</text>
  <!-- Line accent -->
  <rect x="100" y="300" width="80" height="3" rx="1.5" fill="#388BFD" opacity="0.6"/>
</svg>