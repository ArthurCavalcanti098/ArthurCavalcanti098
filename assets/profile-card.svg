  <rect x="476" y="260" width="80" height="28" rx="6" fill="#4169E1" opacity="0.15"/>
  <text x="516" y="279" font-family="Inter, sans-serif" font-size="12" fill="#4169E1" text-anchor="middle" font-weight="500">PostgreSQL</text>
  <rect x="568" y="260" width="72" height="28" rx="6" fill="#339933" opacity="0.15"/>
  <text x="604" y="279" font-family="Inter, sans-serif" font-size="12" fill="#339933" text-anchor="middle" font-weight="500">Node.js</text>
  <rect x="652" y="260" width="40" height="28" rx="6" fill="#F05032" opacity="0.15"/>
