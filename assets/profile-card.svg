  <rect x="300" y="260" width="80" height="28" rx="6" fill="#3178C6" opacity="0.15"/>
  <text x="340" y="279" font-family="Inter, sans-serif" font-size="12" fill="#3178C6" text-anchor="middle" font-weight="500">TypeScript</text>
  <rect x="392" y="260" width="72" height="28" rx="6" fill="#2496ED" opacity="0.15"/>
