# ============================================
# GitHub Profile Metrics (OPTIONAL)
# ============================================
#
# This workflow is OPTIONAL. The profile README
# works perfectly without it.
#
# It generates a weekly metrics image using
# lowlighter/metrics.
#
# To enable:
# 1. Go to repo Settings > Secrets > Actions
# 2. Create secret: METRICS_TOKEN
# 3. Generate PAT at: https://github.com/settings/tokens
# 4. Grant scopes: repo, read:user
#
# To disable:
# Simply delete this file or rename it to metrics.yml.disabled
#
# ============================================

name: metrics

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ArthurCavalcanti098
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_colors: github
          plugin_repositories: yes
          plugin_repositories_limit: 4
          output_action: none
          filename: metrics.svg
